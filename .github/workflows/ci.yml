name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0

      - name: Install dependencies
        run: npm ci

      - name: lint
        run: npm run lint

      - name: format
        run: npm run format:check

      - name: types
        run: npm run types